<!DOCTYPE html>
<html lang="en">
<head>

            text-align: center;
        }

        #main-body {

            justify-content: center;
        }

            border: 3px solid rgb(152, 152, 152);
        }

        .content {
            display: flex;
            font-size: larger;
            justify-content: center;
        }

        .separator {
            width: 3px;
            background-color: rgb(152, 152, 152);
            margin: 0 20px;

    </style>
</head>

</html>
